server:
  port: 8084

spring:
  application:
    name: backup-service
  config:
    import: optional:configserver:http://configuser:configpass@localhost:8888

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

tracing:
  sampling:
    probability: 1.0
